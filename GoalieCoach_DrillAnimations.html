<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goalie Coach - Animated Drill Library</title>
    <style>
        :root {
            --bg-primary: #0B1426;
            --bg-secondary: rgba(17, 29, 51, 0.7);
            --bg-tertiary: #182740;
            --accent-green: #00E676;
            --accent-blue: #448AFF;
            --accent-yellow: #FFD740;
            --accent-red: #FF5252;
            --text-primary: #FFFFFF;
            --text-secondary: #B0BEC5;
            --text-tertiary: #546E7A;
            --border-glass: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 16px;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            background: var(--bg-tertiary);
            flex-shrink: 0;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: rgba(17, 29, 51, 0.5);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-tertiary);
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .drill-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-glass);
            cursor: pointer;
            transition: all 0.2s;
        }
        .drill-item:hover, .drill-item.active {
            background: var(--bg-tertiary);
            border-left: 4px solid var(--accent-green);
        }
        .drill-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .drill-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .badge {
            background: rgba(68, 138, 255, 0.15);
            color: var(--accent-blue);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge.green {
            background: rgba(0, 230, 118, 0.15);
            color: var(--accent-green);
        }
        .badge.featured {
            background: rgba(255, 215, 64, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }
        
        .field-container {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4;
            flex-shrink: 0;
            background: #1B5E20;
            border-radius: 20px;
            border: 2px solid var(--border-glass);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
            margin-bottom: 24px;
            transition: background 0.5s ease;
        }
        
        /* Training Surface for non-field drills */
        .field-container.at-home {
            background: #263238; /* Neutral Concrete/Training surface */
        }

        /* Half-field has a lighter top stripe to show the field continues beyond */
        .field-container.half-field {
            background: linear-gradient(to bottom, #145214 0%, #1B5E20 20%);
        }
        
        .field-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease;
        }

        .field-container.at-home .field-lines {
            opacity: 0;
        }
        
        /* Wall UI */
        .wall-visual {
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 10px;
            background: #78909C;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 5;
            display: none;
            border: 1px solid #455A64;
        }
        .wall-visual::after {
            content: 'TRAINING WALL';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #B0BEC5;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .entity {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: top 0.6s cubic-bezier(0.4, 0, 0.2, 1), left 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            z-index: 10;
        }
        .goalie {
            width: 36px;
            height: 36px;
            background: var(--accent-green);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0B1426;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(0,230,118,0.4);
            z-index: 12;
        }
        .ball {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            border: 2px solid #000;
            box-shadow: 0 4px 12px rgba(255,255,255,0.4);
            z-index: 13;
        }
        .attacker {
            width: 32px;
            height: 32px;
            background: var(--accent-red);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 4px 12px rgba(255,82,82,0.4);
            z-index: 11;
        }
        
        .carousel-card {
            width: 100%;
            max-width: 650px;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }
        
        .carousel-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent-green);
        }
        .drill-pillar-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            display: block;
        }
        .carousel-desc {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-primary);
            min-height: 50px;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .carousel-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .btn {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            border: 1.5px solid var(--accent-blue);
            padding: 10px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover:not(:disabled) {
            background: var(--accent-blue);
            color: white;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--text-tertiary);
            color: var(--text-tertiary);
        }
        
        .step-dots {
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dot.active {
            background: var(--accent-green);
            transform: scale(1.3);
            box-shadow: 0 0 8px var(--accent-green);
        }
        
        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .info-block {
            background: rgba(255,255,255,0.03);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-glass);
        }
        .info-title {
            font-size: 10px;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .info-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    </style>
</head>
<body>

<header>Goalie Coach — Drill Library Animations</header>

<div class="container">
    <div class="sidebar" id="sidebar">
        <!-- Content injected via JS -->
    </div>
    
    <div class="main-content">
        <div class="field-container" id="field-container">

            <!-- ═══ FULL FIELD SVG ═══ Both halves, center circle, both goals -->
            <svg class="field-svg" id="svg-full-field" viewBox="0 0 100 130" preserveAspectRatio="none" style="display:none;">
                <!-- Grass stripes (horizontal bands) -->
                <rect x="0" y="0" width="100" height="130" fill="#196B1E"/>
                <rect x="0" y="0"   width="100" height="13" fill="#1D7822"/>
                <rect x="0" y="26"  width="100" height="13" fill="#1D7822"/>
                <rect x="0" y="52"  width="100" height="13" fill="#1D7822"/>
                <rect x="0" y="78"  width="100" height="13" fill="#1D7822"/>
                <rect x="0" y="104" width="100" height="13" fill="#1D7822"/>
                <!-- Field markings -->
                <g stroke="rgba(255,255,255,0.75)" fill="none" stroke-linejoin="round">
                    <!-- Outer boundary -->
                    <rect x="3" y="3" width="94" height="124" stroke-width="1.2"/>
                    <!-- Center line -->
                    <line x1="3" y1="65" x2="97" y2="65" stroke-width="0.9"/>
                    <!-- Center circle -->
                    <ellipse cx="50" cy="65" rx="13" ry="10" stroke-width="0.9"/>
                    <circle cx="50" cy="65" r="1" fill="rgba(255,255,255,0.8)"/>

                    <!-- TOP END — opponent goal -->
                    <rect x="21" y="3" width="58" height="20" stroke-width="0.8"/> <!-- penalty area -->
                    <rect x="37" y="3" width="26" height="7"  stroke-width="0.8"/> <!-- goal box -->
                    <circle cx="50" cy="16" r="0.9" fill="rgba(255,255,255,0.8)"/>
                    <path d="M 40,23 A 13,11 0 0 1 60,23" stroke-width="0.8"/> <!-- penalty arc -->
                    <!-- Goal bracket (top) -->
                    <polyline points="43,12 43,3 57,3 57,12" stroke-width="2.5" stroke="white"/>
                    <!-- Corner arcs (top) -->
                    <path d="M 3,6.5 A 3.5,3.5 0 0 0 6.5,3"  stroke-width="0.8"/>
                    <path d="M 93.5,3 A 3.5,3.5 0 0 0 97,6.5" stroke-width="0.8"/>

                    <!-- BOTTOM END — keeper's goal -->
                    <rect x="21" y="107" width="58" height="20" stroke-width="0.8"/> <!-- penalty area -->
                    <rect x="37" y="120" width="26" height="7"  stroke-width="0.8"/> <!-- goal box -->
                    <circle cx="50" cy="114" r="0.9" fill="rgba(255,255,255,0.8)"/>
                    <path d="M 40,107 A 13,11 0 0 0 60,107" stroke-width="0.8"/> <!-- penalty arc -->
                    <!-- Goal bracket (bottom) -->
                    <polyline points="43,118 43,127 57,127 57,118" stroke-width="2.5" stroke="white"/>
                    <!-- Corner arcs (bottom) -->
                    <path d="M 3,123.5 A 3.5,3.5 0 0 1 6.5,127"  stroke-width="0.8"/>
                    <path d="M 93.5,127 A 3.5,3.5 0 0 1 97,123.5" stroke-width="0.8"/>
                </g>
            </svg>

            <!-- ═══ HALF FIELD SVG ═══ Keeper's half — halfway line to goal. Used for cross drills, long approach drills -->
            <!-- All 3 SVGs share viewBox="0 0 100 130" so entity % positions map identically -->
            <svg class="field-svg" id="svg-half-field" viewBox="0 0 100 130" preserveAspectRatio="none" style="display:none;">
                <!-- Grass stripes -->
                <rect x="0" y="0"  width="100" height="130" fill="#196B1E"/>
                <rect x="0" y="0"  width="100" height="22"  fill="#1D7822"/>
                <rect x="0" y="44" width="100" height="22"  fill="#1D7822"/>
                <rect x="0" y="88" width="100" height="22"  fill="#1D7822"/>
                <!-- Field markings -->
                <g stroke="rgba(255,255,255,0.75)" fill="none" stroke-linejoin="round">
                    <!-- Side lines (left & right, full height) -->
                    <line x1="3"  y1="4" x2="3"  y2="127" stroke-width="1.2"/>
                    <line x1="97" y1="4" x2="97" y2="127" stroke-width="1.2"/>
                    <!-- Goal line (bottom) -->
                    <line x1="3" y1="127" x2="97" y2="127" stroke-width="1.2"/>
                    <!-- Halfway line (top) — dashed -->
                    <line x1="3" y1="4" x2="97" y2="4" stroke-width="1" stroke-dasharray="4,3" stroke="rgba(255,255,255,0.4)"/>
                    <!-- Penalty area (big box) — Penalty area is top 41% of "half" = 53 units from bottom = y=74 -->
                    <rect x="21" y="74" width="58" height="53" stroke-width="0.9"/>
                    <!-- Goal box (6-yd) — 14 units from bottom = y=113 -->
                    <rect x="37" y="113" width="26" height="14" stroke-width="0.9"/>
                    <!-- Penalty spot: 11m ≈ 27 units from goal → y=127-27=100 -->
                    <circle cx="50" cy="100" r="1" fill="rgba(255,255,255,0.85)"/>
                    <!-- Penalty arc — exits penalty area top at y=74 -->
                    <path d="M 33,74 A 22,23 0 0 1 67,74" stroke-width="0.9"/>
                    <!-- Goal bracket -->
                    <polyline points="43,117 43,127 57,127 57,117" stroke-width="2.5" stroke="white"/>
                    <!-- Corner arcs (bottom corners) -->
                    <path d="M 3,123 A 4,4 0 0 1 7,127"  stroke-width="0.8"/>
                    <path d="M 93,127 A 4,4 0 0 1 97,123" stroke-width="0.8"/>
                </g>
            </svg>

            <!-- ═══ 1/3 FIELD SVG ═══ Defensive third only (default for most on-field drills) -->
            <!-- Zoomed into the goalkeeper's zone. Penalty area fills most of the view. -->
            <svg class="field-svg" id="svg-third-field" viewBox="0 0 100 130" preserveAspectRatio="none">
                <!-- Grass stripes (3 wide bands) -->
                <rect x="0" y="0"  width="100" height="130" fill="#196B1E"/>
                <rect x="0" y="0"  width="100" height="43"  fill="#1D7822"/>
                <rect x="0" y="87" width="100" height="43"  fill="#1D7822"/>
                <!-- Field markings -->
                <g stroke="rgba(255,255,255,0.75)" fill="none" stroke-linejoin="round">
                    <!-- Side lines (left & right) -->
                    <line x1="3"  y1="4" x2="3"  y2="127" stroke-width="1.2"/>
                    <line x1="97" y1="4" x2="97" y2="127" stroke-width="1.2"/>
                    <!-- Goal line (bottom) -->
                    <line x1="3" y1="127" x2="97" y2="127" stroke-width="1.2"/>
                    <!-- Top edge of 1/3 zone — dashed -->
                    <line x1="3" y1="4" x2="97" y2="4" stroke-width="1" stroke-dasharray="4,3" stroke="rgba(255,255,255,0.35)"/>
                    <!-- Penalty area (big box) — scaled to 1/3: ~61 units deep → y=127-61=66 -->
                    <rect x="21" y="66" width="58" height="61" stroke-width="1"/>
                    <!-- Goal box (6-yd box) — 20 units deep → y=107 -->
                    <rect x="37" y="107" width="26" height="20" stroke-width="1"/>
                    <!-- Penalty spot: ~41 units from goal → y=127-41=86 -->
                    <circle cx="50" cy="86" r="1.2" fill="rgba(255,255,255,0.9)"/>
                    <!-- Penalty arc — wide arc at y=66 (top of penalty area) -->
                    <path d="M 23,66 A 34,34 0 0 1 77,66" stroke-width="1"/>
                    <!-- Goal bracket (keeper's goal) -->
                    <polyline points="43,113 43,127 57,127 57,113" stroke-width="3" stroke="white"/>
                    <!-- Corner arcs (bottom) -->
                    <path d="M 3,122 A 5,5 0 0 1 8,127"  stroke-width="0.9"/>
                    <path d="M 92,127 A 5,5 0 0 1 97,122" stroke-width="0.9"/>
                </g>
            </svg>

            <!-- Environment / Field Type label -->
            <div id="field-label" style="position:absolute;top:8px;right:8px;z-index:20;background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.8);font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;letter-spacing:0.5px;">⚽ 1/3 Field</div>

            <div id="wall-ui" class="wall-visual"></div>
            
            <div id="ent-goalie" class="entity goalie" style="top: 95%; left: 50%; opacity: 0; display: none;">GK</div>
            <div id="ent-ball" class="entity ball" style="top: 60%; left: 50%; opacity: 0; display: none;"></div>
            
            <!-- Dynamic Attackers Container -->
            <div id="attackers-container"></div>
        </div>



        
        <div class="carousel-card">
            <span class="drill-pillar-label" id="c-pillar">Pillar Name</span>
            <div class="carousel-header" id="c-title">Drill Name</div>
            
            <div class="carousel-desc" id="c-desc">Step description goes here.</div>
            
            <div class="carousel-controls">
                <button class="btn" id="btn-prev" onclick="prevStep()">&larr; Back</button>
                <div class="step-dots" id="c-dots"></div>
                <button class="btn" id="btn-next" onclick="nextStep()">Next &rarr;</button>
            </div>

            <div class="setup-section">
                <div class="info-block">
                    <div class="info-title">Equipment / Setup</div>
                    <div class="info-text" id="c-setup">Setup details...</div>
                </div>
                <div class="info-block">
                    <div class="info-title">Volume (Sets/Reps)</div>
                    <div class="info-text" id="c-volume">Volume details...</div>
                </div>
                <div class="info-block">
                    <div class="info-title">Focus Points</div>
                    <div class="info-text" id="c-focus">Focus points...</div>
                </div>
                <div class="info-block">
                    <div class="info-title">Variation (Make it Harder)</div>
                    <div class="info-text" id="c-variation">Variation details...</div>
                </div>
            </div>
        </div>
    </div>
</div>

, 60], "attacker": [50, 50]}, {"desc": "Ball is shot", "goalie": [50, 95], "ball": [45, 93], "attacker": [50, 50]}, {"desc": "Save made", "goalie": [45, 93], "ball": [45, 93], "attacker": [50, 50]}, {"desc": "Recover to center", "goalie": [50, 95], "ball": [10, 50], "attacker": [50, 50]}]}, {"id": "MENTAL_&_PSYCHOLOGICAL_U14-U18_3", "pillar": "MENTAL & PSYCHOLOGICAL", "age_group": "U14-U18", "name": "Journaling & Reflection", "type": "\ud83c\udfe0", "setup": "Notebook", "steps": "Write (1) Well (2) Different (3) Focus after every session.", "focus": "Self-awareness, pattern recognition, growth mindset.", "volume": "Every training/match.", "variation": "**Harder:** Present your journal entries during 1-on-1 coach meetings.", "is_wall": false, "animation": [{"desc": "Ready Position", "goalie": [50, 95], "ball": [50, 60], "attacker": [50, 50]}, {"desc": "Ball is shot", "goalie": [50, 95], "ball": [45, 93], "attacker": [50, 50]}, {"desc": "Save made", "goalie": [45, 93], "ball": [45, 93], "attacker": [50, 50]}, {"desc": "Recover to center", "goalie": [50, 95], "ball": [10, 50], "attacker": [50, 50]}]}];
    const featuredDrills = ["Collapse Dive Progression", "1v1 Approach Drill", "Distribution Decision Game"];
    
    let currentDrill = null;
    let currentStep = 0;
    
    const sidebar = document.getElementById('sidebar');
    const titleEl = document.getElementById('c-title');
    const pillarEl = document.getElementById('c-pillar');
    const descEl = document.getElementById('c-desc');
    const setupEl = document.getElementById('c-setup');
    const focusEl = document.getElementById('c-focus');
    const volumeEl = document.getElementById('c-volume');
    const variationEl = document.getElementById('c-variation');
    const dotsEl = document.getElementById('c-dots');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const wallUI = document.getElementById('wall-ui');
    const svgGoal = document.getElementById('svg-goal');
    const fieldContainer = document.getElementById('field-container');
    
    const entGoalie = document.getElementById('ent-goalie');
    const entBall = document.getElementById('ent-ball');
    const attackersContainer = document.getElementById('attackers-container');

    function init() {
        sidebar.innerHTML = '';
        let currentPillarHeader = "";
        
        drillsData.forEach((drill, index) => {
            if (drill.pillar !== currentPillarHeader) {
                currentPillarHeader = drill.pillar;
                const header = document.createElement('div');
                header.className = 'sidebar-header';
                header.textContent = currentPillarHeader;
                sidebar.appendChild(header);
            }

            const isFeatured = featuredDrills.includes(drill.name);
            const div = document.createElement('div');
            div.className = 'drill-item';
            div.innerHTML = `
                <div class="drill-title">${drill.name}</div>
                <div class="drill-meta">
                    <span class="badge">${drill.age_group}</span>
                    <span class="badge green">${drill.type}</span>
                    ${isFeatured ? '<span class="badge featured">ANIMATED</span>' : ''}
                    ${drill.is_wall ? '<span class="badge" style="background:rgba(120,144,156,0.1); color:#90A4AE;">WALL</span>' : ''}
                </div>
            `;
            div.onclick = () => loadDrill(index);
            sidebar.appendChild(div);
        });
        
        const firstFeaturedIndex = drillsData.findIndex(d => d.name === "Collapse Dive Progression");
        loadDrill(firstFeaturedIndex >= 0 ? firstFeaturedIndex : 0);
    }
    
    function loadDrill(index) {
        document.querySelectorAll('.drill-item').forEach(el => el.classList.remove('active'));
        const items = Array.from(document.querySelectorAll('.drill-item:not(.sidebar-header)'));
        if (items[index]) items[index].classList.add('active');
        
        currentDrill = drillsData[index];
        currentStep = 0;
        
        titleEl.textContent = currentDrill.name;
        pillarEl.textContent = currentDrill.pillar;
        setupEl.textContent = currentDrill.setup;
        focusEl.textContent = currentDrill.focus;
        volumeEl.textContent = currentDrill.volume;
        variationEl.textContent = currentDrill.variation;

        // Toggle Wall Setup and Environment
        const svgFullField  = document.getElementById('svg-full-field');
        const svgHalfField  = document.getElementById('svg-half-field');
        const svgThirdField = document.getElementById('svg-third-field');

        // Field type detection
        const fullFieldKeywords = ['full pitch', 'full game', '11v11', 'full corner', 'full team'];
        const halfFieldKeywords  = ['25 yards', '30 yards', '35 yards', '40 yards', 'midfield', 'counter'];
        const setupLower = ((currentDrill.setup || '') + ' ' + (currentDrill.name || '')).toLowerCase();

        const isWall      = currentDrill.is_wall;
        const isHome      = currentDrill.type && currentDrill.type.includes('🏠') && !isWall;
        const isFullField = !isWall && !isHome && (currentDrill.full_field === true || fullFieldKeywords.some(k => setupLower.includes(k)));
        const isHalfField = !isWall && !isHome && !isFullField && (
            (currentDrill.pillar || '').toUpperCase().includes('CROSS') ||
            halfFieldKeywords.some(k => setupLower.includes(k))
        );
        // 1/3 field is the default for all remaining on-field drills

        // Helper: show one SVG, hide others
        function showField(show3rd, showHalf, showFull) {
            svgThirdField.style.display = show3rd  ? 'block' : 'none';
            svgHalfField.style.display  = showHalf ? 'block' : 'none';
            svgFullField.style.display  = showFull ? 'block' : 'none';
        }

        const fieldLabel = document.getElementById('field-label');

        if (isWall) {
            wallUI.style.display = 'block';
            fieldContainer.className = 'field-container at-home';
            showField(false, false, false);
            fieldLabel.textContent = '🏠 Wall Drill';
        } else if (isHome) {
            wallUI.style.display = 'none';
            fieldContainer.className = 'field-container at-home';
            showField(false, false, false);
            fieldLabel.textContent = '🏠 At Home';
        } else if (isFullField) {
            wallUI.style.display = 'none';
            fieldContainer.className = 'field-container';
            showField(false, false, true);
            fieldLabel.textContent = '⚽ Full Field';
        } else if (isHalfField) {
            wallUI.style.display = 'none';
            fieldContainer.className = 'field-container half-field';
            showField(false, true, false);
            fieldLabel.textContent = '⚽ Half Field';
        } else {
            // Default: 1/3 field
            wallUI.style.display = 'none';
            fieldContainer.className = 'field-container';
            showField(true, false, false);
            fieldLabel.textContent = '⚽ 1/3 Field';
        }

        updateCarousel();
    }
    
    function updateCarousel() {
        const steps = currentDrill.animation;
        const step = steps[currentStep];
        
        descEl.textContent = step.desc;
        
        // Adjust coordinates for wall drills (facing top)
        updateEntity(entGoalie, step.goalie);
        updateEntity(entBall, step.ball);
        
        // Handle Multiple Attackers
        attackersContainer.innerHTML = '';
        const attList = step.attackers || (step.attacker ? [step.attacker] : []);
        attList.forEach((pos, i) => {
            const att = document.createElement('div');
            att.className = 'entity attacker';
            att.textContent = attList.length > 1 ? (i + 1) : 'A';
            updateEntity(att, pos);
            attackersContainer.appendChild(att);
        });
        
        dotsEl.innerHTML = '';
        steps.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === currentStep ? 'active' : ''}`;
            dotsEl.appendChild(dot);
        });
        
        btnPrev.disabled = false; 
        btnNext.disabled = false;
    }
    
    function updateEntity(el, posArray) {
        if (!posArray) {
            el.style.opacity = '0';
            setTimeout(() => { if (el.style.opacity === '0') el.style.display = 'none'; }, 600);
        } else {
            el.style.display = 'flex';
            // Trigger reflow for transition
            el.offsetHeight; 
            el.style.opacity = '1';
            el.style.left = `${posArray[0]}%`;
            el.style.top = `${posArray[1]}%`;
        }
    }
    
    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
        } else {
            currentStep = currentDrill.animation.length - 1; // Loop to end
        }
        updateCarousel();
    }
    
    function nextStep() {
        if (currentStep < currentDrill.animation.length - 1) {
            currentStep++;
        } else {
            currentStep = 0; // Infinite Loop back to start
        }
        updateCarousel();
    }
    
    window.onload = init;
</script>
