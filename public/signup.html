<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Keeper Coach — Create Your Account</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="login-container glassmorphism">
        <div class="logo-container">
            <h1><span>My</span> Keeper <span>Coach</span></h1>
            <p>This is your career. Own every rep of it.</p>
        </div>
        
        <form id="signupForm" class="login-form">
            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required placeholder="Hope">
            </div>

            <div class="input-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required placeholder="Solo">
            </div>

            <div class="input-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required placeholder="player@example.com">
            </div>
            
            <div class="input-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="input-group" id="parentalConsentGroup" style="display: none;">
                <label for="guardianEmail">Parent/Guardian Email <span style="font-size: 0.8em; color: #ff9800;">(Required for under 13)</span></label>
                <input type="email" id="guardianEmail" placeholder="parent@example.com">
            </div>
            
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required placeholder="••••••••">
                <small id="passwordHint" style="display:block; margin-top:5px; font-size: 0.8rem; color: #aaa;">Must be at least 8 characters with 1 number or symbol.</small>
            </div>

            <div class="input-group">
                <label for="promoCode">Promo Code <span style="opacity:0.5;font-weight:400;">(optional)</span></label>
                <input type="text" id="promoCode" placeholder="e.g. CAMP2026" style="text-transform:uppercase;">
            </div>

            <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px;">
                <input type="checkbox" id="tosAccept" required style="width: auto; margin: 0;">
                <label for="tosAccept" style="margin: 0; font-size: 0.9em;">I agree to the <a href="/terms" target="_blank" style="color: #646cff; text-decoration: underline;">Terms of Service</a> & <a href="/privacy" target="_blank" style="color: #646cff; text-decoration: underline;">Privacy Policy</a>.</label>
            </div>
            
            <button type="submit" class="btn primary-btn" id="signupBtn">Start Training — Free</button>
            <p id="signupErrorMsg" class="error-msg"></p>
        </form>

        <div class="admin-link">
            <a href="/">Already have an account? Log in</a>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="/js/firebase-config.js"></script>
    <script type="module" src="/js/auth.js"></script>
</body>
</html>
